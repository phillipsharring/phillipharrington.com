version: 0.2

env:
  variables:
    S3_BUCKET_NAME: $S3_BUCKET_NAME
    CLOUDFRONT_DISTRIBUTION_ID: $CLOUDFRONT_DISTRIBUTION_ID
  exported-variables:
    - S3_BUCKET_NAME
    - CLOUDFRONT_DISTRIBUTION_ID

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - npm ci

  build:
    on-failure: ABORT
    commands:
      - echo "Building project..."
      - npm run build

      # graspr-build emits dist/<route>/index.html. Flatten to dist/<route>
      # (extensionless) so the existing CloudFront function and apply-metadata
      # step continue to work as-is. See scripts/flatten-dist.mjs for the
      # exact rules and the 404 special case.
      - echo "Flattening dist/ for abstract URLs"
      - node scripts/flatten-dist.mjs

  post_build:
    on-failure: ABORT
    commands:
      - echo "Build complete. Files ready for deployment."

      - echo "Emptying bucket $S3_BUCKET_NAME"
      - aws s3 rm s3://$S3_BUCKET_NAME --recursive

      - echo "Syncing dist/ directory to S3 bucket $S3_BUCKET_NAME"
      # Exclude .vite/ — it's the Vite build manifest that graspr-build-pages
      # reads internally to resolve hashed asset paths. Lives inside dist/ but
      # shouldn't ship to the public bucket.
      - aws s3 sync dist/ s3://$S3_BUCKET_NAME --exact-timestamps --exclude '.vite/*'

      # S3 can't infer Content-Type for extensionless files; tag them as
      # text/html so CloudFront serves them as HTML instead of plain bytes.
      - echo "Applying metadata for abstract URLs"
      - ./scripts/apply-metadata.sh

      # Invalidate CloudFront cache
      - echo "Invalidating CloudFront cache for distribution $CLOUDFRONT_DISTRIBUTION_ID"
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
