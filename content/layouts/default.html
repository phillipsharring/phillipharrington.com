<!doctype html>
[[gitSha]]
<html lang="en" class="m-0 h-[100.09%] p-0">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>[[title]][[siteName]]</title>
        <meta property="og:url" content="[[siteUrl]]" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <script>
            (function () {
                var p = localStorage.getItem('theme') || 'system';
                var d =
                    p === 'dark' ||
                    (p === 'system' && matchMedia('(prefers-color-scheme:dark)').matches);
                document.documentElement.dataset.theme = d ? 'dark' : 'light';
            })();
        </script>
        [[cssHref]] [[jsSrc]] [[pageHead]]
    </head>
    <body id="body" class="bg-th-page font-body text-th-text relative m-0 h-full overflow-auto p-0">
        <a href="#main" class="sr-only focus:not-sr-only">Skip to content</a>
        <div id="wrapper" class="flex min-h-full flex-col">
            <layout-header></layout-header>
            <main
                id="main"
                class="mx-auto flex min-h-max w-full max-w-5xl flex-grow flex-col items-stretch justify-stretch px-4 pt-8 text-lg sm:px-6 sm:pt-12 md:px-8 md:pt-16 lg:px-16"
            >
                [[app]]
            </main>
            <layout-footer></layout-footer>
        </div>
    </body>
</html>
