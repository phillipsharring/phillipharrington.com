[[#if h1]]
<h1 id="[[id]]" class="font-display text-th-heading mb-2 text-4xl font-extrabold">
    <a href="#[[id]]" aria-hidden="true" tabindex="-1"><span class="icon icon-link"></span></a>
    [[slot]]
</h1>
[[/if]][[#if h2]]
<h2 id="[[id]]" class="font-display text-th-heading text-3xl font-bold">
    <a href="#[[id]]" aria-hidden="true" tabindex="-1"><span class="icon icon-link"></span></a>
    [[slot]]
</h2>
[[/if]][[#if h3]]
<h3 id="[[id]]" class="font-display text-th-heading mb-2 text-2xl font-bold tracking-tight">
    <a href="#[[id]]" aria-hidden="true" tabindex="-1"><span class="icon icon-link"></span></a>
    [[slot]]
</h3>
[[/if]][[#if h4]]
<h4 id="[[id]]" class="font-display text-th-heading text-xl font-semibold">
    <a href="#[[id]]" aria-hidden="true" tabindex="-1"><span class="icon icon-link"></span></a>
    [[slot]]
</h4>
[[/if]][[#if h5]]
<h5 id="[[id]]" class="font-display text-th-text mb-2 text-lg font-bold">
    <a href="#[[id]]" aria-hidden="true" tabindex="-1"><span class="icon icon-link"></span></a>
    [[slot]]
</h5>
[[/if]]
